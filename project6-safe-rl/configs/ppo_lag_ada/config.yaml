algo: PPOLagAdapt
seed: 0
env_id: SafetyPointGoal1-v0
train_cfgs:
  # 1e6 for simplicity
  total_steps: 3000000 
  device: cpu
  vector_env_nums: 1
logger_cfgs:
  use_wandb: false
algo_cfgs:
  steps_per_epoch: 30000
  gamma: 0.99
  cost_gamma: 0.99
  lam: 0.97
  lam_c: 0.97
  clip: 0.2
  target_kl: 0.01
  entropy_coef: 0.0
  update_iters: 80
lagrange_cfgs:
  cost_limit: 25.0
  lagrangian_multiplier_init: 1.0
  lambda_lr: 0.035
  lambda_optimizer: Adam
  lagrangian_upper_bound: 10.0
lambda_schedule_cfgs:
  lambda_schedule: sigmoid
  lambda_min: 0.2
  lambda_max: 10.0
  lambda_p0: 0.35
  lambda_kappa: 10.0
model_cfgs: 
  actor: 
    lr: 0.0003
    hidden_sizes: [256,256]
    activation: "tanh"
  critic: 
    lr: 0.001
    hidden_sizes: [256,256]
    activation: "tanh"
  
