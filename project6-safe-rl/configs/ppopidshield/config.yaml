# PPO-PIDShield configuration
# Base algo_cfgs / model_cfgs / lagrange_cfgs are identical to configs/ppo_lag/config.yaml
# so results are directly comparable with PPO-Lagrangian via OmniSafe.

algo: PPOPIDShield          # informational label only (standalone trainer)
seed: 0
env_id: SafetyPointGoal2-v0

train_cfgs:
  total_steps: 5000000      # 100 epochs × 30k steps.
                            # PPO-Lag runs 9.5M (316 epochs); 3M gives enough range to
                            # show all three improvements while remaining feasible.
  vector_env_nums: 1

logger_cfgs:
  use_wandb: false

algo_cfgs:
  steps_per_epoch: 30000
  gamma: 0.99
  cost_gamma: 0.99
  lam: 0.97
  lam_c: 0.97
  clip: 0.2
  target_kl: 0.01
  entropy_coef: 0.0
  update_iters: 80

lagrange_cfgs:
  cost_limit: 25.0                   # used as d_target if curriculum_cfgs absent
  lagrangian_multiplier_init: 1.0
  lambda_lr: 0.05                    # kept for reference; PID replaces lr-based update

model_cfgs:
  actor:
    lr: 0.0003
    hidden_sizes: [256, 256]
    activation: "tanh"
  critic:
    lr: 0.001
    hidden_sizes: [256, 256]
    activation: "tanh"

# ── Innovation 1: PID-Lagrangian + Nesterov Accelerated Dual Ascent ───────────
pid_cfgs:
  enabled: true         # set false to fall back to standard PPO-Lag dual ascent
                        # (λ += lambda_lr · (J_C − d), using lagrange_cfgs.lambda_lr)

  Kp: 0.002             # ← CRITICAL FIX: was 0.15 → reduced 75×
                        #
                        # Root cause of prior failure: PPO-Lag's OmniSafe update is
                        # effectively sign-based (Δλ ≈ ±0.05/epoch regardless of error
                        # magnitude), giving an effective Kp ≈ 0.05/56 ≈ 0.00089.
                        # Our Kp=0.15 was 168× larger → λ exploded to 421 by epoch 33
                        # (PPO-Lag λ≈2.2 at the same point) — destroying the reward
                        # gradient entirely for the whole run.
                        #
                        # Kp=0.002 simulation against the observed cost trajectory:
                        #   epoch  8: λ ≈ 2.1  (PPO-Lag: 1.43) — comparable scale
                        #   epoch 16: λ ≈ 3.5  (PPO-Lag: 1.76) — slightly more aggressive
                        #   epoch 24: λ ≈ 4.1  (PPO-Lag: 2.00) — 2× larger: cost<25 earlier
                        # λ≈4 vs PPO-Lag's λ≈2 at epoch 24 means stronger constraint
                        # enforcement → cost should drop below 25 before epoch 24, beating
                        # PPO-Lag's 750k-step threshold (metric 1).

  Ki: 0.0               # ← CRITICAL FIX: was 0.002 → zero (integral disabled)
                        #
                        # With Ki=0.002 and typical errors of 50/epoch, ∫e accumulated
                        # to ~1600 unit-epochs by epoch 33 → Ki·∫e = 3.2 added per step
                        # ON TOP of the already too-large Kp contribution. Even when
                        # cost briefly dropped to 26 (epoch 24), the integral kept growing
                        # (error=1 → ∫e still positive) so λ never stopped rising.
                        #
                        # Ki=0 converts the controller to PD-only. The Nesterov term
                        # (β=0.3) provides mild "lookahead" momentum that replaces the
                        # integral's history tracking without unbounded accumulation risk.
                        # If cost is consistently above 25, λ grows via Kp alone at a
                        # stable rate; once cost crosses 25, Kp·e becomes negative and
                        # λ self-corrects immediately.

  Kd: 0.002             # derivative gain — rescaled proportionally with Kp (was 0.01)
                        # Kd/Kp ratio maintained at 1:1.
                        # With cost oscillating ±20-40 between epochs:
                        #   Δλ_D = 0.002 × 30 = 0.06 — same order as Δλ_P, useful
                        #   anticipatory signal without destabilising the λ trajectory.

  beta_nesterov: 0.3    # Nesterov momentum β (unchanged — well-calibrated)
                        # Provides 30% lookahead on the prospective position μ without
                        # the 60% overshoot observed at β=0.6. Works correctly at the
                        # corrected Kp scale.

# ── Innovation 2: Adaptive Cost Advantage Normalization + Gradient Ortho ──────
ortho_cfgs:
  enabled: true         # gradient orthogonalization active when agent is genuinely safe
                        # (_is_safe = avg_cost <= d_target = 25.0)
                        #
                        # With the corrected PID (λ≈4 at epoch 24 vs PPO-Lag's λ≈2):
                        # once cost first crosses 25, _is_safe=True fires and the
                        # projection removes the component of the reward gradient that
                        # conflicts with safety. PPO-Lag has no such mechanism — its
                        # policy sacrifices reward to maintain safety throughout. This
                        # is the primary driver of metric 2 (higher return).

# ── Innovation 3: Reachability-Based Predictive Shielding ─────────────────────
shield_cfgs:
  enabled: false        # KEEP DISABLED: dynamics model has insufficient data quality
                        # in the first ~5 epochs, and the resampling overhead slows
                        # training significantly relative to the benefit at this stage.
                        # Re-enable once the PID gains are validated and cost is near 25.
  H: 3
  threshold: 20.0
  max_resample: 5
  shield_warmup: 5
  dynamics_hidden: [128, 128]

# ── Innovation 4a: Safe Curriculum Generation ──────────────────────────────────
curriculum_cfgs:
  enabled: false        # KEEP DISABLED for this comparison run.
                        #
                        # Curriculum creates NEGATIVE PID errors for epochs 1-7
                        # (cost≈80 < d_curr≈120) which would keep λ near 0 during
                        # early training — beneficial for reward learning but detrimental
                        # for meeting the cost<25 before 750k steps target (metric 1).
                        # With Kp=0.002 and curriculum delaying PID activation to epoch 7,
                        # only 17 epochs remain to build λ≈2-4 — achievable but tight.
                        #
                        # To enable curriculum: set Kp=0.004 (2× to compensate for
                        # the delayed activation window) and set enabled=true here.
  d_target: 25.0
  d_init: 150.0
  kappa: 0.25

# ── Innovation 4b: Differential Cost Shaping ──────────────────────────────────
shaping_cfgs:
  enabled: false        # KEEP DISABLED for this comparison run.
                        #
                        # Shaping inflates V_C training targets (shaped cost > raw cost),
                        # which biases the cost critic toward over-estimating cost. At the
                        # corrected λ scale (≈4) this bias is less catastrophic than before,
                        # but may still cause the ortho projection to fire too conservatively.
                        # Enable after verifying the PID/ortho interaction works correctly.
  prox_threshold: 0.5
  hazard_shaping_coef: 0.2
  vase_shaping_coef: 0.3
