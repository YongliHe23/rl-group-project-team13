
algorithm: FOCOPS
environment: SafetyAntVelocity-v1
seed: 0

train:
  total_steps: 1024000
  steps_per_epoch: 2048
  minibatch_size: 64
  update_iters: 10

model:
  hidden_sizes: [64, 64]
  activation: tanh
  initial_log_std: -0.5
  actor_type: gaussian_learning
  weight_initialization_mode: kaiming_uniform
  linear_lr_decay: true
  exploration_noise_anneal: false
  std_range_min: 0.1

algo:
  gamma: 0.99
  cost_gamma: 0.99
  gae_lam: 0.95
  cost_gae_lam: 0.95
  focops_lam: 1.5
  target_kl: 0.02
  focops_eta: 0.02
  clip: 0.2
  kl_early_stop: true
  adv_estimation_method: gae
  standardized_rew_adv: true
  standardized_cost_adv: true
  penalty_coef: 0.0
  use_cost: true

optimization:
  actor_lr: 0.0003
  critic_lr: 0.0003
  critic_l2_reg: 0.001
  use_max_grad_norm: true
  max_grad_norm: 40.0
  use_critic_norm: true

constraint:
  cost_limit: 103.115
  lagrangian_multiplier_init: 0.002
  lagrangian_upper_bound: 2.0
  lambda_lr: 0.004
  lambda_optimizer: Adam

normalization:
  reward_normalize: false
  cost_normalize: false
  obs_normalize: true

runtime:
  vector_env_nums: 1
  parallel: 1
  torch_threads: 1
  device: cpu

logging:
  use_tensorboard: false
  save_model_freq: 1000000000
