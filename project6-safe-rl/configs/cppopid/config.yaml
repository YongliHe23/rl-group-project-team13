algo: CPPOPID
seed: 0
env_id: SafetyPointGoal2-v0

train_cfgs:
  total_steps: 5000000 #5M steps
  vector_env_nums: 1

logger_cfgs:
  use_wandb: false

algo_cfgs:
  steps_per_epoch: 30000
  gamma: 0.99
  cost_gamma: 0.99
  lam: 0.97
  lam_c: 0.97
  clip: 0.2
  target_kl: 0.01
  entropy_coef: 0.0
  update_iters: 80

# OmniSafe CPPOPID PID-Lagrangian parameters (from pid_lagrange.py)
lagrange_cfgs:
  pid_kp: 0.1
  pid_ki: 0.01
  pid_kd: 0.01
  pid_d_delay: 10
  pid_delta_p_ema_alpha: 0.95
  pid_delta_d_ema_alpha: 0.95
  sum_norm: true
  diff_norm: false
  cost_limit: 25.0
  penalty_max: 100.0
  lagrangian_multiplier_init: 0.001

model_cfgs:
  actor:
    lr: 0.0003
    hidden_sizes: [256, 256]
    activation: "tanh"
  critic:
    lr: 0.001
    hidden_sizes: [256, 256]
    activation: "tanh"
