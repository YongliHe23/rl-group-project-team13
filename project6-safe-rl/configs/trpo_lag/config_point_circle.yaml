algo: TRPOLag
env_id: SafetyPointCircle1-v0
seed: 1

train_cfgs:
  device: cpu
  total_steps: 5000000
  vector_env_nums: 4
  torch_threads: 1

algo_cfgs:
  steps_per_epoch: 50000
  update_iters: 10
  batch_size: 128
  target_kl: 0.01
  entropy_coef: 0.0
  reward_normalize: false
  cost_normalize: false
  obs_normalize: true
  kl_early_stop: false
  use_max_grad_norm: true
  max_grad_norm: 40.0
  use_critic_norm: true
  critic_norm_coef: 0.001
  gamma: 0.99
  cost_gamma: 0.99
  lam: 0.95
  lam_c: 0.95
  adv_estimation_method: gae
  standardized_rew_adv: true
  standardized_cost_adv: true
  penalty_coef: 0.0
  use_cost: true
  cg_damping: 0.1
  cg_iters: 15
  fvp_obs: null
  fvp_sample_freq: 1

logger_cfgs:
  use_wandb: false
  use_tensorboard: true
  save_model_freq: 100
  log_dir: ./results/point_circle_trpo_lag
  window_lens: 100

model_cfgs:
  weight_initialization_mode: kaiming_uniform
  actor_type: gaussian_learning
  linear_lr_decay: false
  exploration_noise_anneal: false
  std_range: [0.5, 0.1]
  actor:
    hidden_sizes: [64, 64]
    activation: tanh
    lr: null
  critic:
    hidden_sizes: [64, 64]
    activation: tanh
    lr: 0.001

lagrange_cfgs:
  cost_limit: 5.0
  lagrangian_multiplier_init: 0.001
  lambda_lr: 0.035
  lambda_optimizer: Adam
