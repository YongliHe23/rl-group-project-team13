algo: CPO
env_id: SafetyPointCircle1-v0
seed: 1

train_cfgs:
  device: cpu
  # Point-Circle in the CPO supplement uses batch size 50,000 for 100 iterations.
  total_steps: 5000000
  # Keep the faster runtime settings we measured on this machine.
  vector_env_nums: 4
  torch_threads: 1

algo_cfgs:
  # CPO supplement, Point-Circle:
  # batch_size=50000, rollout length 50-65, max constraint value d=5,
  # lambda_GAE=0.95, lambda_GAE_C=1, gamma=0.995, delta_KL=0.01.
  #
  # Safety-Gymnasium's native PointCircle env has max_episode_steps=500, not 50-65.
  # OmniSafe also does not expose the original rllab rollout plumbing directly, so this
  # config matches the paper at the batch / optimizer / network level as closely as possible.
  steps_per_epoch: 50000
  update_iters: 1
  batch_size: 50000
  target_kl: 0.01
  entropy_coef: 0.0
  reward_normalize: false
  cost_normalize: false
  obs_normalize: false
  kl_early_stop: false
  use_max_grad_norm: false
  max_grad_norm: 40.0
  use_critic_norm: false
  critic_norm_coef: 0.0
  gamma: 0.995
  cost_gamma: 1.0
  lam: 0.95
  lam_c: 1.0
  adv_estimation_method: gae
  standardized_rew_adv: true
  standardized_cost_adv: true
  penalty_coef: 0.0
  use_cost: true
  cg_damping: 1.0e-5
  cg_iters: 10
  fvp_obs: null
  cost_limit: 5.0
  fvp_sample_freq: 5

logger_cfgs:
  use_wandb: false
  use_tensorboard: true
  save_model_freq: 100
  log_dir: ./results/point_circle_cpo
  window_lens: 100

model_cfgs:
  weight_initialization_mode: xavier_uniform
  actor_type: gaussian_learning
  linear_lr_decay: false
  exploration_noise_anneal: false
  std_range: [0.5, 0.1]
  actor:
    hidden_sizes: [64, 32]
    activation: tanh
    lr: null
  critic:
    hidden_sizes: [64, 32]
    activation: tanh
    lr: 0.01
