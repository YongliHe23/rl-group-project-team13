algo: CPO
env_id: SafetyPointGather1-v0
seed: 1

train_cfgs:
  device: cpu
  total_steps: 5000000
  # Using the OmniSafe default here may reduce multiprocessing overhead on this machine.
  vector_env_nums: 1
  # Using the OmniSafe default here may improve CPU utilization on this machine.
  torch_threads: 16

algo_cfgs:
  # Original CPO Point-Gather script:
  # batch_size=50000, max_path_length=15, n_itr=100, gae_lambda=0.95,
  # safety_gae_lambda=1, discount=0.995, step_size=0.01,
  # optimizer_args={'subsample_factor': 0.2}, safety max_value=0.1.
  steps_per_epoch: 50000
  update_iters: 1
  batch_size: 50000
  target_kl: 0.01
  entropy_coef: 0.0
  reward_normalize: false
  cost_normalize: false
  obs_normalize: false
  kl_early_stop: false
  use_max_grad_norm: false
  max_grad_norm: 40.0
  use_critic_norm: false
  critic_norm_coef: 0.0
  gamma: 0.995
  cost_gamma: 1.0
  lam: 0.95
  lam_c: 1.0
  adv_estimation_method: gae
  standardized_rew_adv: true
  standardized_cost_adv: true
  penalty_coef: 0.0
  use_cost: true
  cg_damping: 1.0e-5
  cg_iters: 10
  fvp_obs: null
  cost_limit: 0.1
  fvp_sample_freq: 5

logger_cfgs:
  use_wandb: false
  use_tensorboard: true
  save_model_freq: 100
  log_dir: ./runs
  window_lens: 100

model_cfgs:
  weight_initialization_mode: xavier_uniform
  actor_type: gaussian_learning
  linear_lr_decay: false
  exploration_noise_anneal: false
  std_range: [0.5, 0.1]
  actor:
    hidden_sizes: [64, 32]
    activation: tanh
    lr: null
  critic:
    hidden_sizes: [64, 32]
    activation: tanh
    lr: 0.01
